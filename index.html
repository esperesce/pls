<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accesso Riservato</title>
    <style>
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        button {
            background: transparent;
            color: #00ffcc;
            border: 2px solid #00ffcc;
            padding: 20px 40px;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
            text-decoration: none;
            display: inline-block;
        }

        button:hover {
            background: #00ffcc;
            color: #000;
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.6);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="cookies.html" target="_blank">
            <button>Valentina, clicca il pulsante</button>
        </a>
    </div>

</body>
</html>
